    <use href="#upper-leg" />
    <use href="#middle-leg" />
    <use href="#lower-leg" />
    <use href="#outer-leg" transform="translate(600 0) scale(-1 1)" />
    <use href="#upper-leg" transform="translate(600 0) scale(-1 1)" />
    <use href="#middle-leg" transform="translate(600 0) scale(-1 1)" />
    <use href="#lower-leg" transform="translate(600 0) scale(-1 1)" />

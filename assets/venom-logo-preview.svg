<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Preview of clean Venom-style spider emblem</title>
  <desc id="desc">A white Venom-style spider emblem shown on a dark background for easier previewing.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05080b" />
      <stop offset="0.5" stop-color="#111a1f" />
      <stop offset="1" stop-color="#020304" />
    </linearGradient>

    <style>
      .logo-fill {
        fill: #ffffff;
      }

      .logo-line {
        fill: none;
        stroke: #ffffff;
        stroke-width: 28;
        stroke-linecap: butt;
        stroke-linejoin: miter;
        stroke-miterlimit: 10;
      }
    </style>

    <path id="outer-leg" d="M 262 318 L 217 318 L 150 245 L 38 285 L -55 455" />
    <path id="upper-leg" d="M 264 364 L 210 362 L 127 295 L 44 333 L -58 531" />
    <path id="middle-leg" d="M 267 410 L 216 407 L 130 354 L 54 386 L -41 582" />
    <path id="lower-leg" d="M 270 454 L 221 451 L 140 417 L 72 438 L 3 612" />
  </defs>

  <rect width="600" height="900" fill="url(#background)" />
  <rect x="250" width="100" height="900" fill="#ffffff" opacity="0.04" />

  <g class="logo-fill">
    <path d="M 300 210
             L 276 258
             L 287 315
             L 313 315
             L 324 258

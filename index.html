<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert images to JPG, PNG, or WebP instantly in your browser. Free and private.">
  <title>Image Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Image Converter</h1>
      <p class="header__tagline">Pick your format, drop your images, save them to your device</p>
    </header>

    <section class="toolbar" id="toolbar">
      <div class="toolbar__group">
        <span class="toolbar__label">Save as</span>
        <div class="pills" role="group" aria-label="Output format">
          <button type="button" class="pill pill--active" data-format="image/jpeg">JPG</button>
          <button type="button" class="pill" data-format="image/png">PNG</button>
          <button type="button" class="pill" data-format="image/webp">WebP</button>
        </div>
      </div>

      <div class="toolbar__group">
        <label class="toolbar__label" for="sizeMode">Size</label>
        <select id="sizeMode" class="select">
          <option value="none">Same as original</option>
          <option value="small">A bit smaller (75%)</option>
          <option value="half">Half the size</option>
          <option value="width">Limit width…</option>
        </select>
      </div>

      <div class="toolbar__group toolbar__group--quality" id="qualityGroup">
        <div class="toolbar__label-row">
          <span class="toolbar__label">Quality</span>
          <span class="toolbar__value" id="qualityValue">85%</span>
        </div>
        <input type="range" id="quality" class="range" min="1" max="100" value="85">
      </div>

      <div class="toolbar__group toolbar__group--width" id="widthGroup" hidden>
        <label class="toolbar__label" for="maxWidth">Max width (px)</label>
        <input type="number" id="maxWidth" class="input" min="1" placeholder="1920">
      </div>
    </section>

    <section class="dropzone" id="dropzone" tabindex="0">
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="dropzone__inner">
        <svg class="dropzone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M12 16V4m0 0L8 8m4-4l4 4"/>
          <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
        </svg>
        <p class="dropzone__text" id="dropzoneText">Drop images here or click to browse</p>
      </div>
    </section>

    <div class="gallery-header" id="galleryHeader" hidden>
      <p class="gallery-header__count"><span id="imageCount">0</span> images</p>
      <div class="gallery-header__actions">
        <button type="button" class="btn btn--ghost btn--sm" id="saveAllBtn">Save all</button>
        <button type="button" class="btn btn--ghost btn--sm" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <footer class="footer">
      <p>Runs entirely in your browser — your images never leave your device.</p>
    </footer>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <script src="js/app.js"></script>
</body>
</html>
